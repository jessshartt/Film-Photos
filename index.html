<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Film Photos</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Password Gate -->
  <div id="gate">
    <div class="gate-box">
      <h1>Film Photos</h1>
      <input type="password" id="password-input" placeholder="Enter password" />
      <button onclick="checkPassword()">Enter</button>
      <p id="error-msg" style="display:none;">Wrong password, try again.</p>
    </div>
  </div>

  <!-- Homepage -->
  <div id="home" style="display:none;">
    <header>
      <h1>Film Photos</h1>
      <nav>
        <a href="favorites.html">Favorites</a>
      </nav>
    </header>
    <div class="album-grid" id="album-grid"></div>
  </div>

  <script>
    const PASSWORD = "film";

    function showHome() {
      document.getElementById("gate").style.display = "none";
      document.getElementById("home").style.display = "block";
      loadAlbums();
    }

    if (localStorage.getItem("film_auth") === "true") {
      showHome();
    }

    function checkPassword() {
      const input = document.getElementById("password-input").value;
      if (input === PASSWORD) {
        localStorage.setItem("film_auth", "true");
        showHome();
      } else {
        document.getElementById("error-msg").style.display = "block";
      }
    }

    document.getElementById("password-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") checkPassword();
    });

    async function loadAlbums() {
      const res = await fetch("albums.json");
      const albums = await res.json();
      const grid = document.getElementById("album-grid");
      albums.forEach(album => {
        const cover = album.photos[0] || "";
        const card = document.createElement("a");
        card.href = `album.html?id=${album.id}`;
        card.className = "album-card";
        card.innerHTML = `
          <div class="album-cover" style="background-image:url('${cover}')"></div>
          <div class="album-info">
            <span class="album-name">${album.name}</span>
            <span class="album-count">${album.photos.length} photos</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }
  </script>

</body>
</html>
