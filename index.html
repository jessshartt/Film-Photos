<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Film Photos</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Password Gate -->
  <div id="gate">
    <div class="gate-box">
      <h1>Film Photos</h1>
      <input type="password" id="password-input" placeholder="Enter password" />
      <button onclick="checkPassword()">Enter</button>
      <p id="error-msg" style="display:none;">Wrong password, try again.</p>
    </div>
  </div>

  <!-- Gallery -->
  <div id="gallery" style="display:none;">
    <header>
      <h1>Film Photos</h1>
    </header>
    <div class="grid" id="photo-grid">
      <!-- Photos are loaded here automatically -->
    </div>
  </div>

  <script>
    const PASSWORD = "film";

    const PHOTOS = [
      "photos/Image from iOS (14).jpg",
    ];

    function showGallery() {
      document.getElementById("gate").style.display = "none";
      document.getElementById("gallery").style.display = "block";
      loadPhotos();
    }

    // Skip password if already authenticated
    if (localStorage.getItem("film_auth") === "true") {
      showGallery();
    }

    function checkPassword() {
      const input = document.getElementById("password-input").value;
      if (input === PASSWORD) {
        localStorage.setItem("film_auth", "true");
        showGallery();
      } else {
        document.getElementById("error-msg").style.display = "block";
      }
    }

    document.getElementById("password-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") checkPassword();
    });

    function loadPhotos() {
      const grid = document.getElementById("photo-grid");
      PHOTOS.forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        img.alt = "";
        img.loading = "lazy";
        grid.appendChild(img);
      });
    }
  </script>

</body>
</html>
