<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Album</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="page" style="display:none;">
    <header id="album-header">
      <div class="album-header-top">
        <a href="index.html" class="back">←</a>
        <h1 id="album-title"></h1>
      </div>
      <nav>
        <button class="view-toggle active" id="btn-grid" onclick="setView('grid')">Grid</button>
        <span class="toggle-divider">|</span>
        <button class="view-toggle" id="btn-scrapbook" onclick="setView('scrapbook')">Scrapbook</button>
        <span class="toggle-divider">|</span>
        <a href="favorites.html" class="fav-link">♥</a>
      </nav>
    </header>
    <div id="photo-grid" class="grid"></div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" style="display:none;">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <button class="lb-prev" onclick="changePhoto(-1)">‹</button>
    <div class="lb-img-wrap">
      <img id="lb-img" src="" alt="" />
      <div class="lb-actions">
        <button class="lb-heart" id="lb-heart" onclick="toggleFavorite()">♡</button>
        <button class="lb-comment-btn" onclick="openCommentDrawer(photos[currentIndex])">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
      </div>
    </div>
    <button class="lb-next" onclick="changePhoto(1)">›</button>
  </div>

  <!-- Comment Drawer -->
  <div id="comment-overlay" onclick="closeCommentDrawer()"></div>
  <div id="comment-drawer">
    <div class="comment-drawer-header">
      <img id="comment-thumb" src="" alt="" />
      <button class="comment-drawer-close" onclick="closeCommentDrawer()">✕</button>
    </div>
    <div id="comment-list"></div>
    <div class="comment-input-area">
      <input id="comment-name" type="text" placeholder="Your name" maxlength="40" autocomplete="nickname" />
      <div class="comment-input-row">
        <input id="comment-text" type="text" placeholder="Add a comment…" maxlength="300" />
        <button id="comment-post-btn" onclick="submitComment()">Post</button>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyAWr43DkBdHJyRzoepsO6Egd5Lw-uKM8Mc",
      authDomain: "film-photos.firebaseapp.com",
      projectId: "film-photos",
      storageBucket: "film-photos.firebasestorage.app",
      messagingSenderId: "72700167062",
      appId: "1:72700167062:web:bfb560f907c6e26b9c13b7"
    });
    const db = firebase.firestore();

    if (localStorage.getItem("film_auth") !== "true") {
      window.location.href = "index.html";
    }

    const params = new URLSearchParams(window.location.search);
    const albumId = params.get("id");
    let photos = [];
    let currentIndex = 0;
    let currentView = "grid";

    async function init() {
      const res = await fetch("albums.json");
      const albums = await res.json();
      const album = albums.find(a => a.id === albumId);
      if (!album) return;
      document.title = album.name;
      document.getElementById("album-title").textContent = album.name;
      photos = album.photos;
      document.getElementById("page").style.display = "block";
      renderPhotos();
    }

    init();

    // ── View toggle ──
    function setView(mode) {
      currentView = mode;
      document.getElementById("btn-grid").classList.toggle("active", mode === "grid");
      document.getElementById("btn-scrapbook").classList.toggle("active", mode === "scrapbook");
      renderPhotos();
    }

    function renderPhotos() {
      const container = document.getElementById("photo-grid");
      container.innerHTML = "";

      if (currentView === "grid") {
        container.className = "grid";
        document.body.classList.remove("scrapbook-bg");
        document.getElementById("album-header").classList.remove("light");
        photos.forEach((src, i) => {
          const img = document.createElement("img");
          img.alt = "";
          img.loading = "lazy";
          img.onclick = () => openLightbox(i);
          img.addEventListener("load", () => masonryFit(img));
          img.src = src;
          container.appendChild(img);
          if (img.complete && img.naturalWidth) masonryFit(img);
        });
      } else {
        container.className = "scrapbook";
        document.body.classList.add("scrapbook-bg");
        document.getElementById("album-header").classList.add("light");
        renderScrapbook(container);
      }
    }

    // ── Masonry ──
    function masonryFit(img) {
      const rowH = 4, gap = 4;
      if (!img.naturalWidth) return;
      const h = img.offsetWidth * img.naturalHeight / img.naturalWidth;
      img.style.gridRowEnd = `span ${Math.ceil((h + gap) / (rowH + gap))}`;
    }

    window.addEventListener("resize", () => {
      document.querySelectorAll("#photo-grid.grid img").forEach(img => {
        if (img.complete && img.naturalWidth) masonryFit(img);
      });
    });

    // ── Comments ──
    let currentCommentSrc = null;
    let commentUnsubscribe = null;

    function openCommentDrawer(src) {
      currentCommentSrc = src;
      document.getElementById("comment-thumb").src = src;
      document.getElementById("comment-list").innerHTML = "<p class='comment-loading'>Loading…</p>";
      document.getElementById("comment-overlay").classList.add("active");
      document.getElementById("comment-drawer").classList.add("active");
      document.body.style.overflow = "hidden";

      const savedName = localStorage.getItem("film_commenter_name") || "";
      document.getElementById("comment-name").value = savedName;

      if (commentUnsubscribe) commentUnsubscribe();
      commentUnsubscribe = db.collection("comments")
        .where("photoPath", "==", src)
        .orderBy("ts", "asc")
        .onSnapshot(snap => {
          const list = document.getElementById("comment-list");
          if (snap.empty) {
            list.innerHTML = "<p class='comment-empty'>No comments yet — be the first!</p>";
          } else {
            list.innerHTML = snap.docs.map(doc => {
              const d = doc.data();
              const time = d.ts
                ? new Date(d.ts.toDate()).toLocaleDateString("en-US", { month: "short", day: "numeric" })
                : "";
              return `<div class="comment-item">
                <div class="comment-meta">
                  <span class="comment-author">${escapeHtml(d.name)}</span>
                  <span class="comment-time">${time}</span>
                </div>
                <p class="comment-text">${escapeHtml(d.text)}</p>
              </div>`;
            }).join("");
            list.scrollTop = list.scrollHeight;
          }
        });
    }

    function closeCommentDrawer() {
      document.getElementById("comment-overlay").classList.remove("active");
      document.getElementById("comment-drawer").classList.remove("active");
      document.body.style.overflow = "";
      if (commentUnsubscribe) { commentUnsubscribe(); commentUnsubscribe = null; }
      currentCommentSrc = null;
    }

    async function submitComment() {
      const nameEl = document.getElementById("comment-name");
      const textEl = document.getElementById("comment-text");
      const name = nameEl.value.trim();
      const text = textEl.value.trim();
      if (!name || !text || !currentCommentSrc) return;

      localStorage.setItem("film_commenter_name", name);

      const btn = document.getElementById("comment-post-btn");
      btn.disabled = true;
      btn.textContent = "Posting…";

      try {
        await db.collection("comments").add({
          photoPath: currentCommentSrc,
          name,
          text,
          ts: firebase.firestore.FieldValue.serverTimestamp()
        });
        textEl.value = "";
      } catch (e) {
        alert("Couldn't post comment. Try again.");
      }

      btn.disabled = false;
      btn.textContent = "Post";
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // ── Scrapbook ──
    let bookPage = 0;
    let bookPageCount = 0;

    const CYCLE_LAYOUTS = [
      { count: 4, cls: "l-2x2" },
      { count: 3, cls: "l-hero-right" },
      { count: 2, cls: "l-duo" },
      { count: 6, cls: "l-3x2" },
      { count: 3, cls: "l-hero-top" },
      { count: 5, cls: "l-mosaic" },
    ];

    function fitLayout(n) {
      if (n >= 6) return { count: 6, cls: "l-3x2" };
      if (n === 5) return { count: 5, cls: "l-mosaic" };
      if (n === 4) return { count: 4, cls: "l-2x2" };
      if (n === 3) return { count: 3, cls: "l-hero-right" };
      if (n === 2) return { count: 2, cls: "l-duo" };
      return { count: 1, cls: "l-solo" };
    }

    function buildPages() {
      const pages = [];
      let i = 0, cycleIdx = 0;
      while (i < photos.length) {
        const remaining = photos.length - i;
        const next = CYCLE_LAYOUTS[cycleIdx % CYCLE_LAYOUTS.length];
        const layout = remaining < next.count ? fitLayout(remaining) : next;
        pages.push({ photos: photos.slice(i, i + layout.count), cls: layout.cls, startIdx: i });
        i += layout.count;
        if (remaining >= next.count) cycleIdx++;
      }
      return pages;
    }

    function renderScrapbook(container) {
      container.className = "book-wrap";
      const pages = buildPages();
      bookPageCount = pages.length;
      bookPage = 0;
      container.innerHTML = `
        <div class="book-container" id="book-container"></div>
        <div class="book-nav-row">
          <button class="book-prev" onclick="bookNav(-1)">‹</button>
          <div class="book-counter" id="book-counter">1 / ${bookPageCount}</div>
          <button class="book-next" onclick="bookNav(1)">›</button>
        </div>
      `;
      const bookContainer = document.getElementById("book-container");
      pages.forEach((page, pageIdx) => {
        const pageEl = document.createElement("div");
        pageEl.className = `book-page ${page.cls}${pageIdx === 0 ? " active" : ""}`;
        page.photos.forEach((src, j) => {
          const img = document.createElement("img");
          img.src = src; img.alt = ""; img.loading = "lazy";
          img.onclick = () => openLightbox(page.startIdx + j);
          pageEl.appendChild(img);
        });
        bookContainer.appendChild(pageEl);
      });
      let touchStartX = 0;
      bookContainer.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; }, { passive: true });
      bookContainer.addEventListener("touchend", e => {
        const diff = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 50) bookNav(diff > 0 ? 1 : -1);
      });
    }

    function bookNav(dir) {
      const container = document.getElementById("book-container");
      if (!container) return;
      const nextIdx = Math.max(0, Math.min(bookPage + dir, bookPageCount - 1));
      if (nextIdx === bookPage) return;
      const pages = container.querySelectorAll(".book-page");
      const current = pages[bookPage];
      const next = pages[nextIdx];
      const dur = 380;
      if (dir > 0) {
        current.style.transformOrigin = "left center";
        next.style.transformOrigin = "right center";
        current.style.animation = `flipOutLeft ${dur}ms ease forwards`;
        next.style.animation = `flipInRight ${dur}ms ease forwards`;
      } else {
        current.style.transformOrigin = "right center";
        next.style.transformOrigin = "left center";
        current.style.animation = `flipOutRight ${dur}ms ease forwards`;
        next.style.animation = `flipInLeft ${dur}ms ease forwards`;
      }
      next.classList.add("active");
      setTimeout(() => {
        current.classList.remove("active");
        current.style.animation = ""; current.style.transformOrigin = "";
        next.style.animation = ""; next.style.transformOrigin = "";
        bookPage = nextIdx;
        document.getElementById("book-counter").textContent = `${bookPage + 1} / ${bookPageCount}`;
      }, dur);
    }

    // ── Lightbox ──
    function openLightbox(index) {
      currentIndex = index;
      document.getElementById("lb-img").src = photos[currentIndex];
      updateHeart();
      document.getElementById("lightbox").style.display = "flex";
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      document.getElementById("lightbox").style.display = "none";
      document.body.style.overflow = "";
    }

    function changePhoto(dir) {
      currentIndex = (currentIndex + dir + photos.length) % photos.length;
      document.getElementById("lb-img").src = photos[currentIndex];
      updateHeart();
    }

    document.addEventListener("keydown", function(e) {
      if (document.getElementById("lightbox").style.display !== "none") {
        if (e.key === "ArrowRight") changePhoto(1);
        if (e.key === "ArrowLeft") changePhoto(-1);
        if (e.key === "Escape") closeLightbox();
      } else if (currentView === "scrapbook") {
        if (e.key === "ArrowRight") bookNav(1);
        if (e.key === "ArrowLeft") bookNav(-1);
      }
    });

    // ── Favorites ──
    function getFavorites() {
      return JSON.parse(localStorage.getItem("film_favorites") || "[]");
    }

    function toggleFavorite() {
      const src = photos[currentIndex];
      const favs = getFavorites();
      const idx = favs.indexOf(src);
      if (idx === -1) favs.push(src);
      else favs.splice(idx, 1);
      localStorage.setItem("film_favorites", JSON.stringify(favs));
      updateHeart();
    }

    function updateHeart() {
      const src = photos[currentIndex];
      document.getElementById("lb-heart").textContent = getFavorites().includes(src) ? "♥" : "♡";
    }
  </script>

</body>
</html>
